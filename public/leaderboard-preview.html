<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>排行榜预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="leaderboard.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            gap: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.light {
            background: #f4f5f7;
            color: #1f2937;
        }

        body.dark {
            background: #0d0d1f;
            color: #e2e8f0;
        }

        .toggle-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        body.light .toggle-btn {
            background: #1f2937;
            color: #fff;
        }

        body.dark .toggle-btn {
            background: #e2e8f0;
            color: #0d0d1f;
        }

        /* 让面板以静态方式展示 */
        .lb-panel.preview-mode {
            position: relative !important;
            top: auto !important;
            left: auto !important;
            transform: none !important;
            opacity: 1 !important;
            pointer-events: auto !important;
            width: 100%;
            max-width: 540px;
        }
    </style>
</head>

<body class="light">
    <button class="toggle-btn" onclick="toggleTheme()">切换主题</button>

    <div class="lb-panel preview-mode active" id="demo-panel">
        <!-- 头部 -->
        <div class="lb-header">
            <div class="lb-header-left">
                <svg class="lb-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
                    <path d="M4 22h16" />
                    <path
                        d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 19.24 7 20h10c0-.76-.85-1.25-2.03-1.79C14.47 17.98 14 17.55 14 17v-2.34" />
                    <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
                </svg>
                <span class="lb-header-title">排行榜</span>
                <span class="lb-header-subtitle">每日一练</span>
            </div>
            <div class="lb-header-actions">
                <button class="lb-btn-icon lb-btn-refresh" title="刷新">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                </button>
                <button class="lb-btn-icon lb-btn-close" title="关闭">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Tab 切换 -->
        <div class="lb-tabs" id="demo-tabs">
            <button class="lb-tab-btn active" data-tab="today" onclick="switchTab('today')">
                <span class="lb-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg></span>
                今日排行
            </button>
            <button class="lb-tab-btn" data-tab="all" onclick="switchTab('all')">
                <span class="lb-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20V10" />
                        <path d="M18 20V4" />
                        <path d="M6 20v-4" />
                    </svg></span>
                历史排行
            </button>
        </div>

        <div class="lb-tab-content" id="demo-content"></div>
    </div>

    <script>
        const todayData = [
            { rank: 1, username: '张小明', total_score: 285, practice_count: 3 },
            { rank: 2, username: '李华', total_score: 240, practice_count: 2 },
            { rank: 3, username: '王小刚', total_score: 180, practice_count: 2 },
            { rank: 4, username: '赵丽', total_score: 95, practice_count: 1 },
            { rank: 5, username: '当前用户', total_score: 90, practice_count: 1 },
            { rank: 6, username: '陈思思', total_score: 80, practice_count: 1 },
            { rank: 7, username: '刘洋', total_score: 75, practice_count: 1 },
        ];

        const allData = [
            { rank: 1, username: '张小明', total_score: 3580, practice_count: 42 },
            { rank: 2, username: '王小刚', total_score: 3200, practice_count: 38 },
            { rank: 3, username: '李华', total_score: 2950, practice_count: 35 },
            { rank: 4, username: '赵丽', total_score: 2100, practice_count: 25 },
            { rank: 5, username: '陈思思', total_score: 1800, practice_count: 22 },
            { rank: 6, username: '当前用户', total_score: 1560, practice_count: 18 },
            { rank: 7, username: '刘洋', total_score: 1200, practice_count: 14 },
            { rank: 8, username: '孙小红', total_score: 900, practice_count: 11 },
        ];

        const myRankToday = { rank: 5, total_score: 90, practice_count: 1, beat_percentage: '28.6%' };
        const myRankAll = { rank: 6, total_score: 1560, practice_count: 18, beat_percentage: '28.6%' };

        function switchTab(tab) {
            document.querySelectorAll('.lb-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.lb-tab-btn[data-tab="${tab}"]`).classList.add('active');
            renderData(tab);
        }

        function renderData(tab) {
            const isToday = tab === 'today';
            const list = isToday ? todayData : allData;
            const myRank = isToday ? myRankToday : myRankAll;
            const scoreLabel = isToday ? '今日' : '累计';
            const scoreHeader = isToday ? '今日总分' : '累计总分';
            const footerLabel = isToday ? '今日参与' : '共';

            let html = '';

            // 我的排名
            html += `
                <div class="lb-my-rank">
                    <div class="lb-my-rank-left">
                        <div class="lb-my-rank-badge">${myRank.rank}</div>
                        <div class="lb-my-rank-info">
                            <span class="lb-my-rank-label">我的排名</span>
                            <span class="lb-my-rank-value">${scoreLabel} ${myRank.total_score} 分 / ${myRank.practice_count} 次练习</span>
                        </div>
                    </div>
                    <div class="lb-my-rank-stats">
                        <span class="lb-my-rank-beat">${myRank.beat_percentage}</span>
                        <span class="lb-my-rank-beat-label">击败用户</span>
                    </div>
                </div>
            `;

            // 表头
            html += `
                <div class="lb-table-header">
                    <span style="text-align:center">#</span>
                    <span>用户</span>
                    <span style="text-align:right">${scoreHeader}</span>
                    <span style="text-align:right">练习次数</span>
                </div>
            `;

            // 列表
            html += '<div class="lb-list">';
            list.forEach((item, idx) => {
                const isMe = item.username === '当前用户';
                const initial = item.username.charAt(0);
                const delay = Math.min(idx * 40, 400);
                html += `
                    <div class="lb-row${isMe ? ' lb-row-me' : ''}" data-rank="${item.rank}" style="animation-delay: ${delay}ms">
                        <span class="lb-rank">${item.rank}</span>
                        <div class="lb-user">
                            <div class="lb-avatar">${initial}</div>
                            <span class="lb-username">${item.username}${isMe ? ' <span class="lb-me-tag">(我)</span>' : ''}</span>
                        </div>
                        <span class="lb-score">${item.total_score.toLocaleString()}</span>
                        <span class="lb-count">${item.practice_count} 次</span>
                    </div>
                `;
            });
            html += '</div>';

            // 底部
            html += `
                <div class="lb-footer">
                    <span class="lb-footer-text">${footerLabel} <span class="lb-footer-count">${list.length}</span> 位用户参与排名</span>
                </div>
            `;

            document.getElementById('demo-content').innerHTML = html;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            if (document.body.classList.contains('dark')) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        renderData('today');
    </script>
</body>

</html>
