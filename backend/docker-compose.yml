services:
  lingxi-backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: lingxi-chat
    env_file:
      - .env
    ports:
      - "${LINGXI_PORT:-8123}:8000"
    environment:
      LINGXI_DB_PATH: /app/backend/data/chainlit.db
    volumes:
      - ./data:/app/backend/data
      - ./public:/app/backend/public
    restart: unless-stopped
    networks:
      - lingxi-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\nPY"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  lingxi-network:
    driver: bridge
